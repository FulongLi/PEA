<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEA - Power Electronics AI Agent</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #232738;
    --border: #2d3148;
    --accent: #6c63ff;
    --accent-glow: rgba(108, 99, 255, .25);
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────── */
  header {
    background: linear-gradient(135deg, #1e1b4b 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  header .logo { font-size: 2rem; }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header p { color: var(--text2); font-size: .85rem; margin-top: .15rem; }

  /* ── Layout ─────────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: calc(100vh - 80px);
  }
  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; }
  }

  /* ── Sidebar ────────────────────────────────────────── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.25rem;
    overflow-y: auto;
  }
  .sidebar h2 {
    font-size: .8rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text2);
    margin-bottom: .75rem;
  }
  .tool-btn {
    width: 100%;
    padding: .6rem .85rem;
    margin-bottom: .35rem;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--text);
    font-size: .88rem;
    text-align: left;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: .6rem;
  }
  .tool-btn:hover { background: var(--surface2); }
  .tool-btn.active {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: #fff;
  }
  .tool-btn .badge {
    font-size: .65rem;
    padding: .1rem .4rem;
    border-radius: 4px;
    margin-left: auto;
    font-weight: 600;
  }
  .badge-iso { background: #7c3aed33; color: #a78bfa; }
  .badge-new { background: #16a34a22; color: var(--green); }
  .badge-eff { background: #f59e0b22; color: var(--amber); }

  /* ── Main panel ─────────────────────────────────────── */
  .main {
    padding: 2rem;
    overflow-y: auto;
  }
  .main h2 {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: .3rem;
  }
  .main .subtitle {
    color: var(--text2);
    font-size: .88rem;
    margin-bottom: 1.5rem;
  }

  /* ── Form grid ──────────────────────────────────────── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .85rem;
    max-width: 560px;
    margin-bottom: 1.5rem;
  }
  .form-group { display: flex; flex-direction: column; gap: .3rem; }
  .form-group.full { grid-column: 1 / -1; }
  label {
    font-size: .78rem;
    color: var(--text2);
    font-weight: 500;
  }
  input[type="number"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: .55rem .75rem;
    color: var(--text);
    font-size: .9rem;
    font-family: var(--mono);
    outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  .checkbox-group {
    display: flex;
    align-items: center;
    gap: .5rem;
    padding-top: .4rem;
  }
  input[type="checkbox"] {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
  }

  /* ── Button ─────────────────────────────────────────── */
  .calc-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: .7rem 2rem;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: .5rem;
  }
  .calc-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .calc-btn:active { transform: translateY(0); }

  /* ── Result card ────────────────────────────────────── */
  .result-card {
    margin-top: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    max-width: 640px;
    animation: fadeIn .25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }
  .result-header {
    padding: .85rem 1.2rem;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .result-header h3 { font-size: .95rem; }
  .result-body { padding: 1rem 1.2rem; }
  .result-row {
    display: flex;
    justify-content: space-between;
    padding: .4rem 0;
    border-bottom: 1px solid var(--border);
    font-size: .88rem;
  }
  .result-row:last-child { border-bottom: none; }
  .result-row .key { color: var(--text2); }
  .result-row .val { font-family: var(--mono); font-weight: 600; }
  .result-notes {
    margin-top: .75rem;
    padding: .75rem;
    background: #6c63ff0a;
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-size: .82rem;
    color: var(--text2);
    line-height: 1.5;
  }
  .result-sub {
    margin-top: .75rem;
    padding: .6rem .8rem;
    background: var(--surface2);
    border-radius: 8px;
  }
  .result-sub h4 {
    font-size: .78rem;
    color: var(--text2);
    margin-bottom: .4rem;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .eff-badge {
    font-size: 1.3rem;
    font-weight: 700;
    font-family: var(--mono);
    padding: .15rem .6rem;
    border-radius: 6px;
  }
  .eff-good { background: #22c55e22; color: var(--green); }
  .eff-ok   { background: #f59e0b22; color: var(--amber); }
  .eff-low  { background: #ef444422; color: var(--red); }

  .error-msg {
    margin-top: 1rem;
    padding: .75rem 1rem;
    background: #ef444418;
    border: 1px solid #ef444444;
    border-radius: 8px;
    color: var(--red);
    font-size: .88rem;
    max-width: 560px;
  }
  #resultArea { min-height: 50px; }

  .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: .3rem .65rem;
    border-radius: 5px;
    font-size: .75rem;
    cursor: pointer;
    transition: all .15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="logo">⚡</div>
  <div>
    <h1>PEA &mdash; Power Electronics AI Agent</h1>
    <p>Design assistant for DC-DC converters &bull; 8 topologies &bull; efficiency estimation</p>
  </div>
</header>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Design Tools</h2>
    <button class="tool-btn active" data-tool="recommend">📋 Topology Recommendation</button>
    <button class="tool-btn" data-tool="buck">⬇ Buck (Step-Down)</button>
    <button class="tool-btn" data-tool="boost">⬆ Boost (Step-Up)</button>
    <button class="tool-btn" data-tool="buck_boost">↕ Buck-Boost (Inverting)</button>
    <button class="tool-btn" data-tool="sepic">🔄 SEPIC <span class="badge badge-new">NEW</span></button>
    <button class="tool-btn" data-tool="cuk">🔄 Ćuk <span class="badge badge-new">NEW</span></button>
    <button class="tool-btn" data-tool="forward">🔌 Forward <span class="badge badge-iso">ISO</span></button>
    <button class="tool-btn" data-tool="flyback">🔌 Flyback <span class="badge badge-iso">ISO</span></button>
    <button class="tool-btn" data-tool="llc">🔌 LLC Resonant <span class="badge badge-iso">ISO</span></button>
    <button class="tool-btn" data-tool="efficiency">📊 Efficiency Estimate <span class="badge badge-eff">EFF</span></button>
  </aside>

  <!-- Main -->
  <main class="main">
    <h2 id="toolTitle">Topology Recommendation</h2>
    <p class="subtitle" id="toolSubtitle">Get a recommended converter topology based on your voltage and current specs.</p>

    <div class="form-grid" id="formArea"></div>
    <button class="calc-btn" id="calcBtn" onclick="calculate()">⚡ Calculate</button>
    <div id="resultArea"></div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// Tool definitions – fields, descriptions, and compute functions
// ═══════════════════════════════════════════════════════════════════════

const TOOLS = {
  recommend: {
    title: 'Topology Recommendation',
    subtitle: 'Get a recommended converter topology based on your voltage and current specs.',
    fields: [
      { id:'v_in',  label:'V_in (V)',   val:12,  step:0.1, min:0.1 },
      { id:'v_out', label:'V_out (V)',  val:5,   step:0.1, min:0.1 },
      { id:'i_out', label:'I_out (A)',  val:2,   step:0.1, min:0.01 },
      { id:'isolated', label:'Require galvanic isolation', type:'checkbox', val:false },
    ],
    compute: topologyRecommendation,
  },
  buck: {
    title: 'Buck Converter (Step-Down)',
    subtitle: 'Design a Buck converter for V_out < V_in. Calculates L, C, duty cycle.',
    fields: stdFields(),
    compute: buckDesign,
  },
  boost: {
    title: 'Boost Converter (Step-Up)',
    subtitle: 'Design a Boost converter for V_out > V_in.',
    fields: stdFields(5, 12),
    compute: boostDesign,
  },
  buck_boost: {
    title: 'Buck-Boost Converter (Inverting)',
    subtitle: 'Design an inverting Buck-Boost. Output polarity is negative.',
    fields: stdFields(),
    compute: buckBoostDesign,
  },
  sepic: {
    title: 'SEPIC Converter',
    subtitle: 'Non-inverting buck-boost with common ground. Requires two inductors and a coupling capacitor.',
    fields: stdFields(),
    compute: sepicDesign,
  },
  cuk: {
    title: 'Ćuk Converter',
    subtitle: 'Inverting topology with continuous input and output currents (low EMI).',
    fields: stdFields(),
    compute: cukDesign,
  },
  forward: {
    title: 'Forward Converter (Isolated)',
    subtitle: 'Isolated single-ended topology. Good for 50-300 W.',
    fields: isoFields(),
    compute: forwardDesign,
  },
  flyback: {
    title: 'Flyback Converter (Isolated)',
    subtitle: 'Isolated coupled-inductor topology. Good for low-medium power.',
    fields: isoFields(),
    compute: flybackDesign,
  },
  llc: {
    title: 'LLC Resonant Converter',
    subtitle: 'High-efficiency isolated resonant topology with ZVS. Full-bridge primary.',
    fields: [
      { id:'v_in',  label:'V_in (V)',  val:400, step:1, min:1 },
      { id:'v_out', label:'V_out (V)', val:12,  step:0.1, min:0.1 },
      { id:'i_out', label:'I_out (A)', val:20,  step:0.5, min:0.01 },
      { id:'f_sw',  label:'f_sw (kHz)', val:100, step:10, min:10 },
      { id:'q',     label:'Q factor',   val:0.5, step:0.1, min:0.1 },
    ],
    compute: llcDesign,
  },
  efficiency: {
    title: 'Efficiency Estimate',
    subtitle: 'First-order loss breakdown: conduction (Rds_on, DCR, Vf) + switching losses.',
    fields: [
      { id:'v_in',  label:'V_in (V)',  val:12,  step:0.1, min:0.1 },
      { id:'v_out', label:'V_out (V)', val:5,   step:0.1, min:0.1 },
      { id:'i_out', label:'I_out (A)', val:2,   step:0.1, min:0.01 },
      { id:'f_sw',  label:'f_sw (kHz)', val:100, step:10, min:10 },
      { id:'rds',   label:'Rds(on) (mΩ)', val:50, step:5, min:1 },
      { id:'dcr',   label:'Inductor DCR (mΩ)', val:30, step:5, min:1 },
      { id:'vf',    label:'Diode Vf (V)', val:0.5, step:0.1, min:0 },
      { id:'trise', label:'Rise time (ns)', val:20, step:5, min:1 },
      { id:'tfall', label:'Fall time (ns)', val:20, step:5, min:1 },
      { id:'sync',  label:'Synchronous rectification', type:'checkbox', val:false },
    ],
    compute: efficiencyEstimate,
  },
};

function stdFields(vin=12, vout=5) {
  return [
    { id:'v_in',  label:'V_in (V)',  val:vin,  step:0.1, min:0.1 },
    { id:'v_out', label:'V_out (V)', val:vout, step:0.1, min:0.1 },
    { id:'i_out', label:'I_out (A)', val:2,    step:0.1, min:0.01 },
    { id:'f_sw',  label:'f_sw (kHz)',val:100,  step:10,  min:10 },
  ];
}
function isoFields() {
  return [
    { id:'v_in_min', label:'V_in min (V)', val:9,  step:0.1, min:0.1 },
    { id:'v_in_max', label:'V_in max (V)', val:18, step:0.1, min:0.1 },
    { id:'v_out',    label:'V_out (V)',     val:5,  step:0.1, min:0.1 },
    { id:'i_out',    label:'I_out (A)',     val:2,  step:0.1, min:0.01 },
    { id:'f_sw',     label:'f_sw (kHz)',    val:100,step:10,  min:10 },
  ];
}

// ═══════════════════════════════════════════════════════════════════════
// Calculator implementations (mirrors pea/tools/calculator.py)
// ═══════════════════════════════════════════════════════════════════════

function topologyRecommendation(f) {
  const ratio = f.v_out / f.v_in, p = f.v_out * f.i_out;
  if (f.isolated) {
    if (p < 50) return { recommended:'Flyback', alternatives:['Forward'], rationale:'Flyback is cost-effective for low-power isolated applications.', output_power_W:r2(p) };
    if (p < 200) return { recommended:'Flyback', alternatives:['Forward','Push-Pull'], rationale:'Flyback or Forward suitable for medium power.', output_power_W:r2(p) };
    return { recommended:'LLC Resonant', alternatives:['Forward','Phase-shifted Full Bridge'], rationale:'LLC resonant offers highest efficiency at higher power with ZVS.', output_power_W:r2(p) };
  }
  if (ratio < 0.9) return { recommended:'Buck', alternatives:['Buck-Boost'], rationale:'Buck is optimal for step-down. Highest efficiency.', output_power_W:r2(p) };
  if (ratio > 1.1) return { recommended:'Boost', alternatives:['SEPIC','Buck-Boost'], rationale:'Boost is optimal for step-up.', output_power_W:r2(p) };
  return { recommended:'SEPIC', alternatives:['Ćuk','Buck-Boost','Buck+Boost cascade'], rationale:'Input and output voltages are close. SEPIC provides non-inverting buck-boost.', output_power_W:r2(p) };
}

function buckDesign(f) {
  if (f.v_out >= f.v_in) return { error:'Buck requires V_out < V_in' };
  const D=f.v_out/f.v_in, fsw=f.f_sw*1e3, di=f.i_out*0.3;
  const L=(f.v_out*(1-D)/(fsw*di))*1e6;
  const dv=f.v_out*0.01, C=(di/(8*fsw*dv))*1e6;
  return { topology:'Buck', duty_cycle:r3(D), inductance_uH:r2(L), capacitance_uF:r2(C), switching_frequency_kHz:f.f_sw, ripple_current_A:r3(di), ripple_voltage_V:r4(dv), notes:'Step-down converter. Use synchronous rectification for high efficiency.' };
}

function boostDesign(f) {
  if (f.v_out <= f.v_in) return { error:'Boost requires V_out > V_in' };
  const D=1-f.v_in/f.v_out, fsw=f.f_sw*1e3, iin=f.i_out*f.v_out/f.v_in, di=iin*0.3;
  const L=(f.v_in*D/(fsw*di))*1e6;
  const dv=f.v_out*0.01, C=(f.i_out*D/(fsw*dv))*1e6;
  return { topology:'Boost', duty_cycle:r3(D), inductance_uH:r2(L), capacitance_uF:r2(C), switching_frequency_kHz:f.f_sw, ripple_current_A:r3(di), ripple_voltage_V:r4(dv), notes:'Step-up converter. Watch for RHP zero at high duty cycle.' };
}

function buckBoostDesign(f) {
  const vo=Math.abs(f.v_out), D=vo/(f.v_in+vo), fsw=f.f_sw*1e3, iin=f.i_out*vo/f.v_in, di=iin*0.3;
  const L=(f.v_in*D/(fsw*di))*1e6;
  const dv=vo*0.01, C=(f.i_out*D/(fsw*dv))*1e6;
  return { topology:'Buck-Boost', duty_cycle:r3(D), inductance_uH:r2(L), capacitance_uF:r2(C), switching_frequency_kHz:f.f_sw, ripple_current_A:r3(di), ripple_voltage_V:r4(dv), notes:'Inverting topology. Output polarity is reversed.' };
}

function sepicDesign(f) {
  const D=f.v_out/(f.v_in+f.v_out), fsw=f.f_sw*1e3, iin=f.i_out*f.v_out/f.v_in, di=iin*0.3;
  const L1=(f.v_in*D/(fsw*di))*1e6;
  const dv=f.v_out*0.01, Cout=(f.i_out*D/(fsw*dv))*1e6;
  const Cc=(f.i_out*D/(fsw*f.v_in*0.05))*1e6;
  return { topology:'SEPIC', duty_cycle:r3(D), L1_inductance_uH:r2(L1), L2_inductance_uH:r2(L1), output_capacitance_uF:r2(Cout), coupling_capacitance_uF:r2(Cc), switching_frequency_kHz:f.f_sw, ripple_current_A:r3(di), ripple_voltage_V:r4(dv), notes:'Non-inverting buck-boost. L1 and L2 can share a coupled core.' };
}

function cukDesign(f) {
  const vo=Math.abs(f.v_out), D=vo/(f.v_in+vo), fsw=f.f_sw*1e3;
  const iin=f.i_out*vo/f.v_in, diIn=iin*0.3, diOut=f.i_out*0.3;
  const L1=(f.v_in*D/(fsw*diIn))*1e6;
  const L2=(vo*(1-D)/(fsw*diOut))*1e6;
  const dv=vo*0.01, Cout=(diOut/(8*fsw*dv))*1e6;
  const Cc=(f.i_out*D/(fsw*(f.v_in+vo)*0.05))*1e6;
  return { topology:'Ćuk', duty_cycle:r3(D), L1_input_inductance_uH:r2(L1), L2_output_inductance_uH:r2(L2), output_capacitance_uF:r2(Cout), coupling_capacitance_uF:r2(Cc), switching_frequency_kHz:f.f_sw, ripple_current_input_A:r3(diIn), ripple_current_output_A:r3(diOut), ripple_voltage_V:r4(dv), notes:'Inverting with continuous I/O currents. Output polarity is negative.' };
}

function forwardDesign(f) {
  const fsw=f.f_sw*1e3, vnom=(f.v_in_min+f.v_in_max)/2, dmax=0.5;
  const n=f.v_out/(f.v_in_min*dmax);
  let Dnom=f.v_out/(n*vnom); Dnom=Math.min(Dnom,dmax);
  const di=f.i_out*0.3, vsec=n*vnom;
  let L=((vsec*Dnom-f.v_out)/(fsw*di))*1e6; L=Math.max(L,0.1);
  const dv=f.v_out*0.01, C=(di/(8*fsw*dv))*1e6;
  return { topology:'Forward', duty_cycle:r3(Dnom), turns_ratio_Ns_Np:r3(n), output_inductance_uH:r2(L), output_capacitance_uF:r2(C), switching_frequency_kHz:f.f_sw, peak_switch_voltage_V:r1(2*f.v_in_max), ripple_current_A:r3(di), notes:'Isolated single-ended. Max D ≈ 0.5 with 1:1 reset winding. MOSFET sees ~2× V_in.' };
}

function flybackDesign(f) {
  const fsw=f.f_sw*1e3, vnom=(f.v_in_min+f.v_in_max)/2, D=0.45;
  const n=(f.v_out/vnom)*(1-D)/D;
  const pout=f.v_out*f.i_out;
  const Lp=(f.v_in_min**2*D**2/(2*pout*fsw))*1e6;
  return { topology:'Flyback', duty_cycle:r3(D), turns_ratio_Ns_Np:r2(n), primary_inductance_uH:r2(Lp), switching_frequency_kHz:f.f_sw, notes:'Isolated converter. Add snubber for MOSFET protection. Consider LLC for higher power.' };
}

function llcDesign(f) {
  const fr=f.f_sw*1e3, pout=f.v_out*f.i_out, Q=f.q;
  if (pout<=0) return { error:'Output power must be positive' };
  const n=2*f.v_out/f.v_in;
  const Rac=8*n**2*f.v_out**2/(Math.PI**2*pout);
  const Cr=1e9/(2*Math.PI*fr*Q*Rac);
  const CrF=Cr*1e-9;
  const Lr=((1/((2*Math.PI*fr)**2*CrF)))*1e6;
  const Lm=Lr*5;
  return { topology:'LLC Resonant', turns_ratio_Ns_Np:r3(n), resonant_inductance_Lr_uH:r2(Lr), magnetizing_inductance_Lm_uH:r2(Lm), resonant_capacitance_Cr_nF:r2(Cr), Lm_Lr_ratio:5, resonant_frequency_kHz:f.f_sw, Q_factor:Q, equivalent_ac_resistance_ohm:r2(Rac), notes:'Full-bridge primary, center-tap secondary. Achieves ZVS near/above resonance. Lm/Lr=5 is a starting point.' };
}

function efficiencyEstimate(f) {
  const pout=f.v_out*f.i_out;
  if (pout<=0) return { error:'Output power must be positive' };
  const fsw=f.f_sw*1e3, rds=f.rds/1e3, dcr=f.dcr/1e3;
  const D = f.v_out < f.v_in ? Math.min(f.v_out/f.v_in, 0.99) : Math.max(1-f.v_in/f.v_out, 0.01);
  const irms=f.i_out*Math.sqrt(D);
  const pFet=irms**2*rds;
  const pDCR=f.i_out**2*dcr;
  const pDiode=f.sync ? f.i_out**2*(1-D)*rds : f.vf*f.i_out*(1-D);
  const pCond=pFet+pDCR+pDiode;
  const tr=f.trise*1e-9, tf=f.tfall*1e-9;
  const pOn=0.5*f.v_in*f.i_out*tr*fsw, pOff=0.5*f.v_in*f.i_out*tf*fsw;
  const pSw=pOn+pOff, pTotal=pCond+pSw, pin=pout+pTotal;
  const eta=pout/pin*100;
  return { output_power_W:r2(pout), estimated_efficiency_pct:r1(eta), total_loss_W:r3(pTotal), conduction_loss_W:r3(pCond), switching_loss_W:r3(pSw), breakdown:{ MOSFET_conduction_W:r3(pFet), inductor_DCR_W:r3(pDCR), diode_or_SR_conduction_W:r3(pDiode), turn_on_loss_W:r3(pOn), turn_off_loss_W:r3(pOff) }, notes:(f.sync?'Synchronous rectification':'Diode rectification')+'. First-order estimate; excludes gate-drive, quiescent, and core losses.' };
}

function r1(v){return Math.round(v*10)/10}
function r2(v){return Math.round(v*100)/100}
function r3(v){return Math.round(v*1000)/1000}
function r4(v){return Math.round(v*10000)/10000}

// ═══════════════════════════════════════════════════════════════════════
// UI logic
// ═══════════════════════════════════════════════════════════════════════

let activeTool = 'recommend';

document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.tool-btn.active')?.classList.remove('active');
    btn.classList.add('active');
    activeTool = btn.dataset.tool;
    renderForm();
  });
});

function renderForm() {
  const tool = TOOLS[activeTool];
  document.getElementById('toolTitle').textContent = tool.title;
  document.getElementById('toolSubtitle').textContent = tool.subtitle;
  document.getElementById('resultArea').innerHTML = '';

  const grid = document.getElementById('formArea');
  grid.innerHTML = '';
  tool.fields.forEach(f => {
    const div = document.createElement('div');
    div.className = 'form-group' + (f.type==='checkbox' ? ' full' : '');
    if (f.type === 'checkbox') {
      div.innerHTML = `<div class="checkbox-group"><input type="checkbox" id="${f.id}" ${f.val?'checked':''}><label for="${f.id}">${f.label}</label></div>`;
    } else {
      div.innerHTML = `<label for="${f.id}">${f.label}</label><input type="number" id="${f.id}" value="${f.val}" step="${f.step||1}" min="${f.min||0}">`;
    }
    grid.appendChild(div);
  });
}

function getValues() {
  const tool = TOOLS[activeTool];
  const vals = {};
  tool.fields.forEach(f => {
    const el = document.getElementById(f.id);
    vals[f.id] = f.type === 'checkbox' ? el.checked : parseFloat(el.value);
  });
  return vals;
}

function calculate() {
  const vals = getValues();
  const tool = TOOLS[activeTool];
  const result = tool.compute(vals);
  renderResult(result);
}

function renderResult(data) {
  const area = document.getElementById('resultArea');
  if (data.error) {
    area.innerHTML = `<div class="error-msg">⚠ ${data.error}</div>`;
    return;
  }

  const notes = data.notes || '';
  const breakdown = data.breakdown;
  delete data.notes;
  delete data.breakdown;

  let effBadge = '';
  if (data.estimated_efficiency_pct !== undefined) {
    const e = data.estimated_efficiency_pct;
    const cls = e >= 90 ? 'eff-good' : e >= 80 ? 'eff-ok' : 'eff-low';
    effBadge = `<span class="eff-badge ${cls}">${e}%</span>`;
  }

  const title = data.topology || data.recommended || 'Result';
  let rows = '';
  for (const [k,v] of Object.entries(data)) {
    if (v === null || v === undefined) continue;
    const label = k.replace(/_/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
    const val = Array.isArray(v) ? v.join(', ') : v;
    rows += `<div class="result-row"><span class="key">${label}</span><span class="val">${val}</span></div>`;
  }

  let breakdownHtml = '';
  if (breakdown) {
    breakdownHtml = '<div class="result-sub"><h4>Loss Breakdown</h4>';
    for (const [k,v] of Object.entries(breakdown)) {
      const label = k.replace(/_/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
      breakdownHtml += `<div class="result-row"><span class="key">${label}</span><span class="val">${v}</span></div>`;
    }
    breakdownHtml += '</div>';
  }

  const notesHtml = notes ? `<div class="result-notes">💡 ${notes}</div>` : '';

  // Reconstruct full object for copy
  const fullData = {...data};
  if (notes) fullData.notes = notes;
  if (breakdown) fullData.breakdown = breakdown;

  area.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <h3>${title} ${effBadge}</h3>
        <button class="copy-btn" onclick="copyResult()">Copy JSON</button>
      </div>
      <div class="result-body">
        ${rows}
        ${breakdownHtml}
        ${notesHtml}
      </div>
    </div>
  `;
  area.dataset.json = JSON.stringify(fullData, null, 2);
}

function copyResult() {
  const json = document.getElementById('resultArea').dataset.json;
  if (json) {
    navigator.clipboard.writeText(json).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy JSON', 1500);
    });
  }
}

// Allow Enter key to calculate
document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });

// Init
renderForm();
</script>
</body>
</html>
